  # bchn:
  #   image: cagataygurturk/docker-ssh-tunnel
  #   volumes:
  #     - $HOME/.ssh:/root/ssh:ro
  #   environment:
  #     SSH_DEBUG: "-v"
  #     # TUNNEL_HOST: bchn-mainnet
  #     # REMOTE_HOST: ec2-13-251-63-215.ap-southeast-1.compute.amazonaws.com
  #     TUNNEL_HOST: bchn-chipnet
  #     REMOTE_HOST: ec2-18-138-226-25.ap-southeast-1.compute.amazonaws.com
  #     LOCAL_PORT: 8332
  #     REMOTE_PORT: 8332
  postgres:
    image: "postgres:11.1-alpine"
    volumes:
      - watchtower_db_data:/var/lib/postgresql/data
    env_file:
      - .env_dev
    command: ["postgres", "-c", "max_connections=200", "-c", "shared_buffers=256MB"]
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: "redis:alpine"
    env_file:
      - .env_dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: .
    command: [ "supervisord", "-c", "/code/supervisor/webserver.conf", "--nodaemon" ]
    ports:
      - "8000:8000"
    env_file:
      - .env_dev
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/code
      - /code/anyhedge/js/node_modules
      - /code/rampp2p/js/node_modules
      - /code/cts/js/node_modules
      - /code/stablehedge/js/node_modules
      - /code/main/js/node_modules
      - /code/multisig/js/node_modules
  test:
    build: .
    command: sh -c "wait-for-it.sh postgres:5432 -t 60 -- psql -h postgres -U postgres -c 'CREATE DATABASE watchtower_test;' || true && python manage.py migrate && python -m pytest multisig/tests/ -v --tb=short"
    env_file:
      - .env_dev
    environment:
      - POSTGRES_DB=watchtower_test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/code
      - /code/multisig/js/node_modules
volumes:
  watchtower_db_data:
    # external: true
    driver: 'local'
